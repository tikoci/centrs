# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# Staged review to conserve the org's prepaid CodeRabbit credits (the default —
# review every PR + every incremental push — exhausts them). Policy:
#   - review only when a PR is marked ready-for-review (skip drafts)
#   - one review per ready PR; no automatic per-commit incremental re-reviews
#   - re-review on demand with an `@coderabbitai review` PR comment
# Terse/no-decoration policy (issue #143): reviews.in_progress_fortune
# defaults to true and was the actual source of the "art" the maintainer
# flagged — reviews.poem already defaults to false but is set explicitly
# below for clarity.
#
# CodeRabbit ignores .coderabbit.yaml changes made *within* an open-source PR
# ("only the configuration from the base branch is applied") — confirmed on
# PR #167, which still got a poem despite this file disabling it, because the
# review ran against `main`'s pre-#167 config. Any edit here only takes
# effect starting with the PR opened *after* this file's change merges to
# `main` — never trust "the PR that adds the setting" as the setting's own
# verification.
language: en-US
tone_instructions: >
  Terse and actionable. No poems, jokes, or decorative filler. State the
  finding, the file/line, and the fix. Skip praise and preamble.
reviews:
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: false
  poem: false
  in_progress_fortune: false
  path_filters:
    - "!.scratch/**"
