name: Verify Extended
run-name: Verify Extended • ${{ github.event_name }}

# Manual platform sweep for centrs integration on hosts the ci.yaml gate (Linux
# x86 CHR smoke) and qa.yaml (Linux x86 channel matrix) don't cover. Dispatch-only;
# each platform input maps 1:1 to a job, all independent and parallel.
#
# Scope note: by default startIntegrationChr boots an *x86* CHR, so x86-CHR only
# gets hardware acceleration on an x86 host. That makes macos-x86 (Intel, HVF —
# the maintainer's own platform) the primary extended target; windows-x86 is TCG
# and informational.
#
# arm64: startIntegrationChr can now boot an aarch64 CHR (`CENTRS_CHR_ARCH=arm64`,
# wired in chr.ts), but no arm64 job is added yet — quickchr 0.4.2 has an arm64
# REST-POST bug (a `restPost` to /rest/execute returns the prior `restGet`'s body;
# quickchr BACKLOG P3) that breaks centrs's execute path, which every integration
# test exercises. So an arm64 job would be known-red. It gets wired once that
# upstream bug is fixed (tikoci/quickchr); the centrs side is already ready.
#
# test-filter picks integration files (comma-separated, e.g.
# "chr-smoke.test.ts,rest-retrieve.test.ts"); each file boots its own CHR, so a
# narrow filter is much faster. Default = the single-boot smoke. Empty = all.
#
# packages installs extra RouterOS packages into the CHR before the tests run
# (comma/space-separated, e.g. "container") — exercises centrs against a fuller
# RouterOS than the bare image. Empty = bare CHR.

on:
  workflow_dispatch:
    inputs:
      macos-x86:
        description: "Integration — macOS x86_64 (macos-15-intel, HVF)"
        type: boolean
        default: true
      windows-x86:
        description: "Integration — Windows x86_64 (windows-latest, TCG — experimental, informational, non-gating)"
        type: boolean
        default: false
      test-filter:
        description: "Comma-separated integration file names. Default = chr-smoke; empty = all."
        type: string
        default: "chr-smoke.test.ts"
      packages:
        description: "Extra RouterOS packages to install in the CHR (comma/space-separated, e.g. \"container\"). Empty = bare CHR."
        type: string
        default: ""

permissions:
  contents: read
concurrency:
  group: verify-extended-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  macos-x86:
    name: Integration (macOS x86_64)
    if: ${{ inputs.macos-x86 }}
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install QEMU
        run: brew install qemu
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Resolve integration files
        id: files
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          set -eo pipefail
          if [ -z "$TEST_FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            files=""
            IFS=',' read -ra parts <<< "$TEST_FILTER"
            for f in "${parts[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                files="$files test/integration/$f"
              else
                echo "::warning::Skipping unknown integration file: $f"
              fi
            done
            echo "list=$files" >> "$GITHUB_OUTPUT"
          fi
      - name: Run integration (per-file, x86 CHR via HVF)
        id: run
        env:
          FILES: ${{ steps.files.outputs.list }}
          CENTRS_CHR_PACKAGES: ${{ inputs.packages }}
        run: |
          set -eo pipefail
          echo "::group::Integration output"
          : > /tmp/ext-output.txt
          status=0
          for f in $FILES; do
            echo "::notice::Running $f"
            CENTRS_RUN_FAST_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/ext-output.txt || status=$?
          done
          echo "::endgroup::"
          exit "$status"
      - name: Surface result to job summary
        if: always()
        run: |
          set -o pipefail
          {
            echo "## Integration — macOS x86_64"
            if grep -qE '\(fail\)' /tmp/ext-output.txt 2>/dev/null; then
              echo "### ❌ Failing tests"
              echo '```'
              grep -E '\(fail\)' /tmp/ext-output.txt || true
              echo '```'
            else
              echo "✅ passed"
            fi
            echo '```'
            tail -60 /tmp/ext-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: verify-extended-macos-x86
          path: /tmp/ext-output.txt
          if-no-files-found: warn
          retention-days: 7

  windows-x86:
    name: Integration (Windows x86_64, TCG)
    if: ${{ inputs.windows-x86 }}
    runs-on: windows-latest
    # Experimental / informational: x86 CHR under TCG (no acceleration on the
    # Windows runner) and centrs is not yet Windows-clean, so this never gates.
    continue-on-error: true
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install QEMU
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\qemu"
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Resolve integration files
        id: files
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          set -eo pipefail
          if [ -z "$TEST_FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            files=""
            IFS=',' read -ra parts <<< "$TEST_FILTER"
            for f in "${parts[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                files="$files test/integration/$f"
              else
                echo "::warning::Skipping unknown integration file: $f"
              fi
            done
            echo "list=$files" >> "$GITHUB_OUTPUT"
          fi
      - name: Run integration (per-file, x86 CHR via TCG)
        env:
          FILES: ${{ steps.files.outputs.list }}
          CENTRS_CHR_PACKAGES: ${{ inputs.packages }}
        run: |
          set -eo pipefail
          echo "::group::Integration output"
          : > /tmp/ext-output.txt
          status=0
          for f in $FILES; do
            echo "::notice::Running $f"
            CENTRS_RUN_FAST_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/ext-output.txt || status=$?
          done
          echo "::endgroup::"
          exit "$status"
      - name: Surface result to job summary
        if: always()
        run: |
          set -o pipefail
          {
            echo "## Integration — Windows x86_64 (TCG, informational)"
            if grep -qE '\(fail\)' /tmp/ext-output.txt 2>/dev/null; then
              echo "### ❌ Failing tests"
              echo '```'
              grep -E '\(fail\)' /tmp/ext-output.txt || true
              echo '```'
            else
              echo "✅ passed"
            fi
            echo '```'
            tail -60 /tmp/ext-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: verify-extended-windows-x86
          path: /tmp/ext-output.txt
          if-no-files-found: warn
          retention-days: 7
