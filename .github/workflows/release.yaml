name: Build to Release
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish artifacts after the release workflow is fully implemented
        type: boolean
        default: false
permissions:
  contents: read
jobs:
  release-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Release workflow placeholder
        run: echo "Release publishing is intentionally disabled until packaging specs are implemented. publish=${{ inputs.publish }}"
