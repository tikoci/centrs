name: QA
run-name: QA • ${{ github.event_name }} • ${{ github.ref_name }}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:
    inputs:
      run-integration:
        description: Run RouterOS CHR integration tests
        type: boolean
        default: true
      routeros_channel:
        description: RouterOS channel for CHR integration when routeros_version is empty
        type: choice
        options:
          - stable
          - long-term
          - testing
          - development
        default: stable
      routeros_version:
        description: Explicit RouterOS version for CHR integration; overrides routeros_channel
        type: string
        default: ""

permissions:
  actions: read
  contents: read
  security-events: read
concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extended-tests:
    name: Tests
    # OS axis (JG-18): pushes/PRs stay on ubuntu (the fast gate), while the
    # scheduled + dispatched QA adds macos to catch platform-specific behavior —
    # path handling, the ssh `/dev/null` vs `NUL` sink, and process spawning in
    # the network-free cli-smoke tier. CHR itself stays ubuntu-only (it needs
    # KVM, which GitHub only provides on Linux runners).
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest", "macos-latest"]' || '["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test with coverage
        run: bun run test:ci
      # `build` is the fast gate's job (ci.yaml); QA owns coverage, CodeQL,
      # the AI-findings probe, and the CHR matrix. No duplicate build here.
      - name: AI findings probe
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          paths=(
            "repos/${REPO}/code-quality/findings"
            "repos/${REPO}/code-quality/alerts"
            "repos/${REPO}/code-scanning/ai-alerts"
            "repos/${REPO}/security/quality"
            "repos/${REPO}/security/ai-findings"
          )
          found=""
          for p in "${paths[@]}"; do
            status=$(gh api -i "$p" 2>/dev/null | head -1 | awk '{print $2}' || true)
            if [ -n "$status" ] && [ "$status" != "404" ] && [ "$status" != "410" ]; then
              found="$p (HTTP $status)"
              break
            fi
          done
          if [ -z "$found" ]; then
            echo "::notice title=AI findings API::Not yet exposed via REST. Check https://github.com/${REPO}/security/quality/ai-findings in a browser (requires auth). (Probed: ${paths[*]})"
            exit 0
          fi
          echo "::warning title=AI findings API now available::Endpoint ${found} responded; promote this step from probe to gate when findings are stable."
          gh api "${found%% *}" || true
  chr-integration:
    name: CHR integration • ${{ matrix.routeros_channel }}${{ inputs.routeros_version && format(' • {0}', inputs.routeros_version) || '' }}
    runs-on: ubuntu-latest
    needs: extended-tests
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run-integration) }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        routeros_channel: ${{ fromJSON(github.event_name == 'schedule' && '["stable","long-term"]' || format('["{0}"]', inputs.routeros_channel || 'stable')) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils unzip
      - name: Enable KVM
        run: |
          if [ -e /dev/kvm ]; then
           sudo chmod 666 /dev/kvm
           ls -l /dev/kvm
          else
           echo "::warning::/dev/kvm is unavailable; quickchr will use slower TCG emulation."
          fi
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test against CHR
        id: chr_test
        env:
          CENTRS_CHR_CHANNEL: ${{ matrix.routeros_channel }}
          CENTRS_CHR_VERSION: ${{ inputs.routeros_version || '' }}
          CENTRS_INTEGRATION_REPORT: ${{ runner.temp }}/centrs-integration-report.jsonl
        run: |
          set -e
          echo "RouterOS target: ${CENTRS_CHR_VERSION:-channel ${CENTRS_CHR_CHANNEL}}"
          bun run test:integration
      - name: Show integration evidence
        if: always()
        env:
          CENTRS_INTEGRATION_REPORT: ${{ runner.temp }}/centrs-integration-report.jsonl
        run: |
          if [ -f "$CENTRS_INTEGRATION_REPORT" ]; then
           cat "$CENTRS_INTEGRATION_REPORT"
          else
           echo "::warning::No CHR integration evidence report was written."
          fi
      # Persist the run (channel, the version that actually booted, pass/fail,
      # date, commit) to a bun:sqlite history so the channel→version drift and
      # the must-pass policy can be read from real data. Additive + always-run:
      # recording never changes the job's pass/fail.
      # Best-effort telemetry: continue-on-error keeps the CHR test result as the
      # job outcome. All run-block values come in via env (or built-in
      # $RUNNER_TEMP/$GITHUB_SHA) so the shell treats user-controllable inputs
      # (routeros_version) as data, never as code — no template injection.
      - name: Record QA result
        if: always()
        continue-on-error: true
        env:
          CHANNEL: ${{ matrix.routeros_channel }}
          REQUESTED_VERSION: ${{ inputs.routeros_version || '' }}
          OUTCOME: ${{ steps.chr_test.outcome == 'success' && 'pass' || 'fail' }}
        run: |
          bun run scripts/qa-results-db.ts \
            --db "$RUNNER_TEMP/qa-results.sqlite" \
            --channel "$CHANNEL" \
            --requested-version "$REQUESTED_VERSION" \
            --outcome "$OUTCOME" \
            --commit "$GITHUB_SHA" \
            --report "$RUNNER_TEMP/centrs-integration-report.jsonl"
      - name: Upload QA results DB
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ matrix.routeros_channel }}
          path: ${{ runner.temp }}/qa-results.sqlite
          if-no-files-found: warn
  codeql-analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
