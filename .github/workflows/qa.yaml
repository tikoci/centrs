name: QA
run-name: QA • ${{ github.event_name }} • ${{ github.ref_name }}

# QA is the *definitive* RouterOS surface: every active channel booted on a real
# CHR via quickchr, with results recorded to a bun:sqlite store. It runs on every
# push to main (the integrated branch), a weekly cron, on demand, and is
# workflow_call-able by release.yaml for the release-tier sweep. The fast
# lint/unit/build/CHR-smoke gate is ci.yaml; security scanning is codeql.yaml —
# neither runs here, so there is no duplicate test/coverage/CodeQL work.

on:
  push:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:
    inputs:
      routeros_channel:
        description: RouterOS channel — "all" fans the active set into one matrix run
        type: choice
        options:
          - stable
          - long-term
          - testing
          - development
          - all
        default: all
      routeros_version:
        description: Explicit RouterOS version for CHR; overrides routeros_channel
        type: string
        default: ""
  workflow_call:
    inputs:
      routeros_channel:
        description: RouterOS channel; "all" = the active set
        type: string
        default: all
      routeros_version:
        description: Explicit RouterOS version; overrides routeros_channel
        type: string
        default: ""

permissions:
  contents: read

# Event-aware concurrency: a newer push to main cancels the older QA run (no point
# piling up stale full-matrix runs), but dispatched / scheduled / called runs each
# get a unique group (github.run_id) so they never cancel one another — manual
# multi-channel verification stays independent. (Fixes the same-ref self-cancel
# that forced serial-by-hand channel dispatch.)
concurrency:
  group: qa-${{ github.event_name == 'push' && 'main-push' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Recency-aware matrix axis (B-2 / quickchr#3). quickchr resolves the live
  # channel→version map and returns the channels worth booting — released
  # (stable, long-term) always, plus any pre-release (testing, development) at or
  # ahead of stable, since the four channels are not monotonically ordered
  # (testing can lag stable as a stale rc, then leapfrog it). A concrete dispatch
  # channel pins a single leg; "all" / push / schedule / the release sweep fan the
  # active set. The "what's worth booting" smarts live in quickchr; centrs keeps
  # only the must-pass gate (see accumulate-and-gate).
  resolve-matrix:
    name: Resolve active channels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      channels: ${{ steps.matrix.outputs.channels }}
    steps:
      # Read-only job (resolves the matrix axis; no commits), so it needs no git
      # credentials — drop them to limit token exposure. (Tag-pinned like the rest
      # of this workflow: repo convention is tags for first-party actions/*, SHA
      # pins for third-party actions such as setup-bun.)
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # quickchr 0.4.1+ resolves MikroTik hosts over public DNS, so this works on
      # GitHub runners; if recency still can't be resolved the script falls back
      # to the released channels (never drops a must-pass leg). The requested
      # channel/version arrive via env (never inlined into the run block); an
      # explicit version pins a single leg rather than fanning the active set.
      - name: Resolve active channel set
        id: matrix
        env:
          REQUESTED_CHANNEL: ${{ inputs.routeros_channel || '' }}
          REQUESTED_VERSION: ${{ inputs.routeros_version || '' }}
        run: |
          bun run scripts/qa-active-channels.ts \
            --requested-channel "$REQUESTED_CHANNEL" \
            --requested-version "$REQUESTED_VERSION" \
            --summary "$GITHUB_STEP_SUMMARY"

  chr-matrix:
    name: CHR • ${{ matrix.routeros_channel }}${{ inputs.routeros_version && format(' • {0}', inputs.routeros_version) || '' }}
    needs: resolve-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # The matrix axis is the recency-aware active set resolved by resolve-matrix
    # (released channels always + any pre-release at/ahead of stable). Only the
    # released channels are *must-pass*: a beta flake on a pre-release leg (e.g.
    # JG-31's EC-SRP5/btest path is intermittently flaky) is recorded to history
    # but never reds the run — best-effort legs are `continue-on-error`, mirroring
    # `channelPolicy` in scripts/qa-results-db.ts. The downstream
    # `accumulate-and-gate` job is the policy gate + cross-run history accumulator.
    # Explicit versions are on demand; the release-tier sweep arrives via
    # workflow_call. macOS/arm CHR coverage lives in verify-extended.yaml (KVM).
    strategy:
      fail-fast: false
      matrix:
        routeros_channel: ${{ fromJSON(needs.resolve-matrix.outputs.channels) }}
    # Best-effort (non-released) legs never red the workflow on their own; the
    # accumulate-and-gate job is the merge-reddening authority. The released set
    # here must match MUST_PASS_CHANNELS in scripts/qa-results-db.ts.
    continue-on-error: ${{ matrix.routeros_channel != 'stable' && matrix.routeros_channel != 'long-term' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils unzip
      - name: Enable KVM
        run: |
          if [ -e /dev/kvm ]; then
           sudo chmod 666 /dev/kvm
           ls -l /dev/kvm
          else
           echo "::warning::/dev/kvm is unavailable; quickchr will use slower TCG emulation."
          fi
      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-cache-${{ runner.os }}-${{ matrix.routeros_channel }}-v1
          restore-keys: chr-cache-${{ runner.os }}-
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test against CHR
        id: chr_test
        env:
          CENTRS_CHR_CHANNEL: ${{ matrix.routeros_channel }}
          CENTRS_CHR_VERSION: ${{ inputs.routeros_version || '' }}
          CENTRS_INTEGRATION_REPORT: ${{ runner.temp }}/centrs-integration-report.jsonl
        run: |
          set -eo pipefail
          echo "RouterOS target: ${CENTRS_CHR_VERSION:-channel ${CENTRS_CHR_CHANNEL}}"
          echo "::group::CHR integration output"
          status=0
          bun run test:integration 2>&1 | tee /tmp/chr-output.txt || status=$?
          echo "::endgroup::"
          exit "$status"
      # Surface the failing tests (not the whole log) to the run summary so an
      # agent reads the signal directly (github-actions-rich-data instruction).
      - name: Surface result to job summary
        if: always()
        run: |
          set -o pipefail
          {
            echo "## CHR • ${{ matrix.routeros_channel }}"
            if grep -qE '\(fail\)' /tmp/chr-output.txt 2>/dev/null; then
              echo "### ❌ Failing tests"
              echo '```'
              grep -E '\(fail\)' /tmp/chr-output.txt || true
              echo '```'
            else
              echo "✅ all CHR tests passed"
            fi
            echo '```'
            tail -40 /tmp/chr-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Show integration evidence
        if: always()
        env:
          CENTRS_INTEGRATION_REPORT: ${{ runner.temp }}/centrs-integration-report.jsonl
        run: |
          if [ -f "$CENTRS_INTEGRATION_REPORT" ]; then
           cat "$CENTRS_INTEGRATION_REPORT"
          else
           echo "::warning::No CHR integration evidence report was written."
          fi
      - name: Upload CHR logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: chr-logs-${{ matrix.routeros_channel }}
          path: |
            /tmp/chr-output.txt
            ${{ runner.temp }}/centrs-integration-report.jsonl
          if-no-files-found: warn
          retention-days: 7
      # Persist the run (channel, the version that actually booted, pass/fail,
      # date, commit) to a bun:sqlite history. Additive + always-run: recording
      # never changes the job outcome. All run-block values arrive via env (or
      # built-in $RUNNER_TEMP/$GITHUB_SHA) so user-controllable inputs
      # (routeros_version) are treated as data, never code — no template injection.
      - name: Record QA result
        if: always()
        continue-on-error: true
        env:
          CHANNEL: ${{ matrix.routeros_channel }}
          REQUESTED_VERSION: ${{ inputs.routeros_version || '' }}
          OUTCOME: ${{ steps.chr_test.outcome == 'success' && 'pass' || 'fail' }}
        run: |
          bun run scripts/qa-results-db.ts \
            --db "$RUNNER_TEMP/qa-results.sqlite" \
            --channel "$CHANNEL" \
            --requested-version "$REQUESTED_VERSION" \
            --outcome "$OUTCOME" \
            --commit "$GITHUB_SHA" \
            --report "$RUNNER_TEMP/centrs-integration-report.jsonl"
      - name: Upload QA results DB
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: qa-results-${{ matrix.routeros_channel }}
          path: ${{ runner.temp }}/qa-results.sqlite
          if-no-files-found: warn

  # Cross-run accumulation + the must-pass gate (the harder half of JG-18). Runs
  # once after the matrix: pulls every per-leg result, appends them to a durable
  # append-log on the `qa-history` branch (artifact retention is finite, and the
  # channel→version drift is the whole point of keeping long history), and fails
  # only when a *released* channel regressed. Beta/test legs are recorded but
  # never gate — see scripts/qa-history.ts.
  accumulate-and-gate:
    name: Accumulate + must-pass gate
    needs: chr-matrix
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # commit the accumulating history to the qa-history branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download per-leg QA results
        uses: actions/download-artifact@v7
        with:
          pattern: qa-results-*
          path: incoming
          merge-multiple: false
      # A worktree on the orphan `qa-history` branch (created on first run). The
      # checkout above set up authenticated `origin`, so fetch/push need no token
      # handling. Identity values are static literals, not user input.
      - name: Prepare qa-history worktree
        env:
          QA_BRANCH: qa-history
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "$QA_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$QA_BRANCH"
            git worktree add qa-history "origin/$QA_BRANCH"
            git -C qa-history checkout -B "$QA_BRANCH"
          else
            git worktree add --detach qa-history
            git -C qa-history checkout --orphan "$QA_BRANCH"
            git -C qa-history rm -rf . >/dev/null 2>&1 || true
          fi
      - name: Accumulate history + evaluate must-pass gate
        id: gate
        run: |
          bun run scripts/qa-history.ts \
            --legs incoming \
            --history qa-history/qa-runs.jsonl \
            --summary "$GITHUB_STEP_SUMMARY"
      # Persist even when the gate failed (a failing run must still land in
      # history) — so this is `always()` and ordered after the gate step.
      - name: Commit accumulated history
        if: always() && github.ref == 'refs/heads/main'
        env:
          QA_BRANCH: qa-history
        run: |
          set -eo pipefail
          cd qa-history
          git add qa-runs.jsonl
          if git diff --cached --quiet; then
            echo "No history change to commit."
            exit 0
          fi
          git commit -m "qa: accumulate CHR run ${GITHUB_SHA}"
          # Rebase-retry in case a concurrent dispatch advanced the branch.
          for attempt in 1 2 3; do
            if git push origin "HEAD:${QA_BRANCH}"; then
              exit 0
            fi
            git fetch origin "$QA_BRANCH" || true
            git rebase "origin/${QA_BRANCH}" || git rebase --abort || true
          done
          echo "::warning title=QA history::could not push qa-history after retries"
