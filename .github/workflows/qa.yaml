name: QA
run-name: QA • ${{ github.event_name }} • ${{ github.ref_name }}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:
    inputs:
      run-integration:
        description: Run integration placeholder
        type: boolean
        default: false

permissions:
  actions: read
  contents: read
  security-events: read
concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extended-tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test with coverage
        run: bun run test:ci
      - name: Build
        run: bun run build
      - name: AI findings probe
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          paths=(
            "repos/${REPO}/code-quality/findings"
            "repos/${REPO}/code-quality/alerts"
            "repos/${REPO}/code-scanning/ai-alerts"
            "repos/${REPO}/security/quality"
            "repos/${REPO}/security/ai-findings"
          )
          found=""
          for p in "${paths[@]}"; do
            status=$(gh api -i "$p" 2>/dev/null | head -1 | awk '{print $2}' || true)
            if [ -n "$status" ] && [ "$status" != "404" ] && [ "$status" != "410" ]; then
              found="$p (HTTP $status)"
              break
            fi
          done
          if [ -z "$found" ]; then
            echo "::notice title=AI findings API::Not yet exposed via REST. Check https://github.com/${REPO}/security/quality/ai-findings in a browser (requires auth). (Probed: ${paths[*]})"
            exit 0
          fi
          echo "::warning title=AI findings API now available::Endpoint ${found} responded; promote this step from probe to gate when findings are stable."
          gh api "${found%% *}" || true
      - name: RouterOS integration placeholder
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-integration }}
        run: echo "RouterOS CHR integration tests will be added with quickchr-backed specs."
  codeql-analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
  dependency-review:
    name: Deps
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
