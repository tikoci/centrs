# CONTEXT: This is where all extended tests live, like integration tests and security checks (CodeQL)
# USAGE: Run as part of `release.yaml`,  or on-demand for "big "
# TODO: Runs CodeQL code scanning, code quality, and dependabot - basically all the bells-and-whistles of GitHub CodeQL (include experimental CodeQL Quality Checks) 
# TODO: Runs integration or other longer regularized tests 
# NOTE: One-off tests or "labs" where a CI runner are requires should use `lab.yaml`

name: Quality Assurance Tests
on:
  # TODO cleanup triggers, this should be trigger by release.yaml
  workflow_dispatch

permissions: # TODO just guessing below
  actions: read
  contents: read
  security-events: write

jobs:
  integration-tests:
    name: Bun Integration Tests
    runs-on: ubuntu # TODO should perhaps be matrix controlled by workflow_dispatch
    steps:
      - run: "bun run test:all"
  codeql-analyze: # NOTE borrowed from tikoci/restraml
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality # <== runs "Quality Checks, with 'AI Findings', --> not visible to agents since these are not in GitHub MCP nor `gh` nor GitHub API "

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
