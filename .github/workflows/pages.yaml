name: Pages
run-name: Pages • ${{ github.event_name }}

# Publishes the typedoc API reference + the error-code catalog
# (docs/errors/**/*.md) to GitHub Pages. This isn't just docs nicety: every
# CentrsError carries `details_url: https://tikoci.github.io/centrs/errors/<code>`
# (see docs/errors/README.md) — until this workflow existed, that URL 404'd for
# every error a caller received. scripts/build-pages-site.ts does the tree
# assembly (typedoc output + one index.html per error code, wrapping pandoc's
# markdown->HTML); this workflow just builds it and deploys it.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docs/errors/**"
      - "package.json"
      - "scripts/build-pages-site.ts"
      - "scripts/gen-error-pages.ts"
      - ".github/workflows/pages.yaml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Build typedoc API reference
        run: bun run build:doc:api
      - name: Scaffold any missing error pages
        run: bun run docs:errors
      - name: Assemble Pages site
        run: |
          bun run scripts/build-pages-site.ts "$RUNNER_TEMP/pages-site"
          touch "$RUNNER_TEMP/pages-site/.nojekyll"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/pages-site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
