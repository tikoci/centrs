name: Pages
run-name: Pages • ${{ github.event_name }}
on:
  workflow_dispatch:
    inputs:
      build-docs:
        description: Enable docs build placeholder
        type: boolean
        default: false
permissions:
  contents: read
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pages-plan:
    name: Placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Pages workflow placeholder
        run: echo "GitHub Pages publishing will be enabled after generated docs are wired. build-docs=${{ inputs.build-docs }}"
