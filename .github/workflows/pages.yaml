name: Publish GitHub Pages
on:
  workflow_dispatch:
    inputs:
      build-docs:
        description: Build generated docs when the docs pipeline is implemented
        type: boolean
        default: false
permissions:
  contents: read
jobs:
  pages-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Pages workflow placeholder
        run: echo "GitHub Pages publishing will be enabled after generated docs are wired. build-docs=${{ inputs.build-docs }}"
