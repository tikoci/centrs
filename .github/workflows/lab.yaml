name: Lab
run-name: Lab • ${{ inputs.experiment }}
on:
  workflow_dispatch:
    inputs:
      experiment:
        description: Experiment name
        required: true
        default: "manual-routeros-grounding"
permissions:
  contents: read
concurrency:
  group: lab-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lab-placeholder:
    name: Placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Record experiment
        run: echo "Lab workflow reserved for non-gating experiments: ${{ inputs.experiment }}"
