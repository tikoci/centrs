name: Lab Tests
on:
  workflow_dispatch:
    inputs:
      experiment:
        description: Name of the lab experiment to document in the run summary
        required: true
        default: "manual-routeros-grounding"
permissions:
  contents: read
jobs:
  lab-placeholder:
    runs-on: ubuntu-latest
    steps:
      - name: Record experiment
        run: echo "Lab workflow reserved for non-gating experiments: ${{ inputs.experiment }}"
