name: CI
run-name: CI • ${{ github.event_name }} • ${{ github.ref_name }}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run-integration:
        description: Run RouterOS CHR integration tests
        type: boolean
        default: true
      routeros_channel:
        description: RouterOS channel for CHR integration when routeros_version is empty
        type: choice
        options:
          - stable
          - long-term
          - testing
          - development
        default: stable
      routeros_version:
        description: Explicit RouterOS version for CHR integration; overrides routeros_channel
        type: string
        default: ""
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Lint CI (docs, spelling, agents)
        run: bun run lint:ci
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
  fixture-integration:
    name: Fixture integration
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test fixture-backed integration
        env:
          TMPDIR: ${{ runner.temp }}
        run: bun run test:integration:fast
  chr-integration:
    name: CHR integration • ${{ inputs.routeros_version || inputs.routeros_channel || 'stable' }}
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-integration }}
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils unzip
      - name: Enable KVM
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
          else
            echo "::warning::/dev/kvm is unavailable; quickchr will use slower TCG emulation."
          fi
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test against CHR
        env:
          CENTRS_CHR_CHANNEL: ${{ inputs.routeros_channel || 'stable' }}
          CENTRS_CHR_VERSION: ${{ inputs.routeros_version || '' }}
          CENTRS_INTEGRATION_REPORT: ${{ runner.temp }}/centrs-integration-report.jsonl
        run: |
          set -e
          echo "RouterOS target: ${CENTRS_CHR_VERSION:-channel ${CENTRS_CHR_CHANNEL}}"
          bun run test:integration
      - name: Show integration evidence
        if: always()
        env:
          CENTRS_INTEGRATION_REPORT: ${{ runner.temp }}/centrs-integration-report.jsonl
        run: |
          if [ -f "$CENTRS_INTEGRATION_REPORT" ]; then
            cat "$CENTRS_INTEGRATION_REPORT"
          else
            echo "::warning::No CHR integration evidence report was written."
          fi
