name: CI
run-name: CI • ${{ github.event_name }} • ${{ github.ref_name }}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Bare manual trigger so the fast gate can be re-run from the UI/CLI without a
  # push; no inputs (the CHR-specific inputs moved to qa.yaml with the CHR job).
  workflow_dispatch: {}
# CI is the fast push/PR gate (lint, unit tests, build, fixture integration).
# RouterOS CHR integration lives only in qa.yaml (scheduled matrix + on-demand
# workflow_dispatch) so there is one chr-integration definition, not two.
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Lint CI (docs, spelling, agents)
        run: bun run lint:ci
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
  fixture-integration:
    name: Fixture integration
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Bun 1.3.13
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test fixture-backed integration
        env:
          TMPDIR: ${{ runner.temp }}
        run: bun run test:integration:fast
